<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Game</title>
    <style>
        body {
            text-align: center;
            background: #222;
            color: white;
        }

        canvas {
            background: black;
            display: block;
        }
    </style>

</head>

<body>
    <div style="position: relative; display: inline-block;">

        <canvas id="gameCanvas" width="1200" height="800"></canvas>

        <div id="gameServerList">

            <div class="serverlist-header">
                <h1>Servers</h1>
            </div>

            <div class="lobby-desc">
                <div class="lobbylist-name lobbylist-column">Lobby name:</div>
                <div class="lobbylist-host lobbylist-column">Host:</div>
                <div class="lobbylist-players lobbylist-column">Player count:</div>
                <div class="lobbylist-status lobbylist-column">Status:</div>
            </div>

            <div id="lobbylist"></div>

            <div class="serverlist-footer">
                <div class="footer-left">
                    <button id="hostbutton">Host</button>
                    <button id="startbutton">Start</button>
                    <button id="settingsButton">Settings</button>
                </div>
                <div class="footer-right">
                    <button id="leavebutton">Leave</button>
                    <button id="joinbutton">Join</button>

                </div>
            </div>

        </div>



        <div id="settingsMenu" class="modal hidden">
            <div class="modal-content">

            </div>
        </div>

        <div id="controlsMenu" class="modal hidden">
            <div class="modal-content">
                <h2>Edit Controls</h2>

                <div class="controls-grid">
                    <div class="input-row"><label for="jumpInput">Jump:</label><input id="jumpInput" readonly
                            placeHolder="Press key">
                    </div>
                    <div class="input-row"><label for="leftInput">Left:</label><input id="leftInput" readonly
                            placeHolder="Press key">
                    </div>
                    <div class="input-row"><label for="rightInput">Right:</label><input id="rightInput" readonly
                            placeHolder="Press key">
                    </div>
                    <div class="input-row"><label for="downInput">Down:</label><input id="downInput" readonly
                            placeHolder="Press key">
                    </div>
                    <div class="input-row"><label for="upInput">Up:</label><input id="upInput" readonly
                            placeholder="Press key"></div>
                    <div class="input-row"><label for="shootInput">Shoot:</label><input id="shootInput" readonly
                            placeholder="pressKey">
                    </div>
                    <div class="input-row"><label for="pickupInput">Pickup:</label><input id="pickupInput" readonly
                            placeholder="pressKey"></div>
                    <div class="input-row"><label for="ragdollInput">Ragdoll:</label><input id="ragdollInput" readonly
                            placeholder="pressKey"></div>
                    <div class="input-row"><label for="strafeInput">Strafe:</label><input id="strafeInput" readonly
                            placeholder="pressKey"></div>
                    <div class="input-row"><label for="menuInput">Menu:</label><input id="menuInput" readonly
                            placeholder="pressKey">
                    </div>
                </div>

                <h2>Player Settings</h2>

                <div class="input-row">
                    <label for="displayNameInput">Name:</label>
                    <input id="displayNameInput" type="text" placeholder="Enter name">
                </div>

                <div class="input-row">
                    <label for="colorInput">Color:</label>
                    <input id="colorInput" type="color">
                </div>

                <div class="modal-buttons">
                    <button id="cancelControlsButton">Cancel</button>
                    <button id="saveControlsButton">Save</button>
                </div>
            </div>
        </div>

        <div id="hostMenu" class="modal hidden">
            <div class="modal-content">
                <h2>Create Lobby</h2>

                <div class="input-row">
                    <label for="lobbyNameInput">Lobby Name: </label>
                    <input type="text" id="lobbyNameInput" placeholder="Enter lobby name">
                </div>

                <div class="input-row">
                    <label for="maxPlayersInput">Max Players: </label>
                    <input type="number" id="maxPlayersInput" value="4" min="2" max="16">
                </div>

                <div class="modal-buttons">
                    <button id="cancelHostbutton">Cancel</button>
                    <button id="createLobbybutton" disabled>Create</button>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="/src/index.ts"></script>
</body>

</html>
